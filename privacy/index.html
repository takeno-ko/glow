<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Glow Privacy Policy</title>
<script>
  (function () {
    var lang = (navigator.language || 'en').toLowerCase();
    var target = 'en.html';
    if (lang.indexOf('ja') === 0) target = 'ja.html';
    else if (lang.indexOf('ko') === 0) target = 'ko.html';
    location.replace(target);
  })();
</script>
<noscript>
  <p>
    <a href="ja.html">日本語</a> ・
    <a href="en.html">English</a> ・
    <a href="ko.html">한국어</a>
  </p>
</noscript>
</head>
<body></body>
</html>
